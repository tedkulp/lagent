name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact_os: darwin
            artifact_arch: amd64
          - target: aarch64-apple-darwin
            artifact_os: darwin
            artifact_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="lagent-${VERSION}-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}.tar.gz"
          cp target/${{ matrix.target }}/release/lagent lagent
          tar czf "$ARCHIVE" lagent
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: lagent-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: tedkulp
          homebrew_tap: homebrew-tap
          formula_folder: Formula
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          commit_owner: tedkulp
          commit_email: ted@tedkulp.com
          install: 'bin.install "lagent"'
          test: 'system "#{bin}/lagent", "--help"'
          target_darwin_amd64: true
          target_darwin_arm64: true
          target_linux_amd64: false
          target_linux_arm64: false
